<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso Administrador | Lomas & Drinks</title>
  <meta name="robots" content="noindex, nofollow">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/admin.css">
  <link rel="icon" type="image/png" href="assets/images/logo.png">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: var(--bg-primary);
      margin: 0;
      font-family: 'Outfit', sans-serif;
    }
    .login-container {
      background: var(--bg-card);
      padding: 2.5rem 2rem;
      border-radius: 16px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      border: 1px solid var(--border-subtle);
      text-align: center;
    }
    .login-logo {
      height: 80px;
      margin-bottom: 1.5rem;
    }
    .login-title {
      color: var(--text-primary);
      font-size: 1.5rem;
      margin-bottom: 2rem;
      font-weight: 600;
    }
    .form-group {
      margin-bottom: 1.5rem;
      text-align: left;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }
    .form-group input {
      width: 100%;
      padding: 0.8rem;
      border-radius: 8px;
      border: 1px solid var(--border-subtle);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.3s;
    }
    .form-group input:focus {
      border-color: var(--gold);
    }
    .btn-login {
      width: 100%;
      padding: 1rem;
      background: var(--gold);
      color: var(--bg-primary);
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 1rem;
    }
    .btn-login:hover {
      background: var(--gold-light);
      transform: translateY(-2px);
      box-shadow: 0 4px 15px var(--gold-glow);
    }
    .btn-login:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }
    .error-msg {
      color: #e57373;
      font-size: 0.85rem;
      margin-top: 1rem;
      min-height: 20px;
    }
    /* Simple loader */
    .loader {
      display: none;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(0,0,0,0.3);
      border-radius: 50%;
      border-top-color: #000;
      animation: spin 1s ease-in-out infinite;
      margin: 0 auto;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="login-container">
    <img src="assets/images/logo.png" alt="Lomas & Drinks" class="login-logo">
    <h2 class="login-title">Panel de Administración</h2>
    
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" required placeholder="admin@lomasdrinks.cl">
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" required placeholder="••••••••">
      </div>
      
      <button type="submit" class="btn-login" id="btnLogin">
        <span id="btnText">Iniciar Sesión</span>
        <div class="loader" id="btnLoader"></div>
      </button>
      
      <div class="error-msg" id="errorMsg"></div>
    </form>
  </div>

  <script type="module">
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    
    // Check if already logged in -> redirect to admin
    const checkSession = setInterval(() => {
      if (window.firebaseApp) {
        clearInterval(checkSession);
        const auth = getAuth(window.firebaseApp);
        onAuthStateChanged(auth, (user) => {
          if (user) {
            window.location.href = 'admin.html';
          }
        });
        
        // Handle form submit
        const form = document.getElementById('loginForm');
        const btnLogin = document.getElementById('btnLogin');
        const btnText = document.getElementById('btnText');
        const btnLoader = document.getElementById('btnLoader');
        const errorMsg = document.getElementById('errorMsg');
        
        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          errorMsg.textContent = '';
          const email = document.getElementById('email').value.trim();
          const password = document.getElementById('password').value;
          
          if(!email || !password) return;
          
          btnText.style.display = 'none';
          btnLoader.style.display = 'block';
          btnLogin.disabled = true;
          
          try {
            await signInWithEmailAndPassword(auth, email, password);
            // onAuthStateChanged will handle the redirect
          } catch(err) {
            console.error(err);
            btnText.style.display = 'block';
            btnLoader.style.display = 'none';
            btnLogin.disabled = false;
            
            // Map Firebase error codes to Spanish
            if (err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password' || err.code === 'auth/user-not-found') {
              errorMsg.textContent = 'Correo o contraseña incorrectos.';
            } else if (err.code === 'auth/too-many-requests') {
              errorMsg.textContent = 'Demasiados intentos fallidos. Intenta más tarde.';
            } else {
              errorMsg.textContent = 'Error al iniciar sesión: ' + err.message;
            }
          }
        });
      }
    }, 100);
  </script>
  <script src="scripts/firebase-config.js" charset="utf-8"></script>
  <script>
    // Initialize Firebase so window.firebaseApp becomes available
    if (typeof initFirebase === 'function') {
      initFirebase().catch(console.error);
    }
  </script>
</body>
</html>
